<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="The Moorland Spritz — a cocktail moment">
  <defs>
    <radialGradient id="lamp" cx=".5" cy=".35" r=".7">
      <stop offset="0%" stop-color="#2a3442"/>
      <stop offset="40%" stop-color="#171c26"/>
      <stop offset="100%" stop-color="#05070b"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1f"/>
      <stop offset="100%" stop-color="#1b140d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(230,235,230,.95)"/>
      <stop offset="40%" stop-color="rgba(196,210,188,.7)"/>
      <stop offset="100%" stop-color="rgba(120,140,110,.25)"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#b5c48a"/>
      <stop offset="100%" stop-color="#6a7a48"/>
    </linearGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 .9  0 0 0 0 .9  0 0 0 0 .9  0 0 0 .08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Dark ambient bg -->
  <rect width="800" height="1000" fill="url(#lamp)"/>

  <!-- Bar surface -->
  <path d="M0 720 L800 720 L800 1000 L0 1000 Z" fill="url(#bar)"/>
  <!-- Edge highlight -->
  <rect x="0" y="719" width="800" height="2" fill="#5e442c" opacity=".5"/>

  <!-- Soft warm glow behind glass -->
  <circle cx="400" cy="560" r="240" fill="rgba(220,180,120,.08)" filter="url(#blur2)"/>

  <!-- Shadow pool -->
  <ellipse cx="400" cy="735" rx="190" ry="18" fill="rgba(0,0,0,.55)" filter="url(#blur2)"/>

  <!-- Cocktail glass: Nick & Nora style -->
  <!-- Bowl -->
  <path d="M280 430
           Q280 580 400 620
           Q520 580 520 430 Z"
        fill="url(#glass)" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
  <!-- Liquid inside -->
  <path d="M295 445
           Q298 560 400 600
           Q502 560 505 445 Z"
        fill="url(#liquid)" opacity=".85"/>
  <!-- Liquid surface ellipse -->
  <ellipse cx="400" cy="448" rx="108" ry="8" fill="#d8e2a7" opacity=".7"/>
  <ellipse cx="400" cy="446" rx="85" ry="5" fill="#f0f3c8" opacity=".45"/>

  <!-- Stem -->
  <rect x="396" y="620" width="8" height="80" fill="rgba(240,240,235,.45)"/>
  <!-- Foot -->
  <ellipse cx="400" cy="710" rx="70" ry="10" fill="rgba(240,240,235,.5)"/>
  <ellipse cx="400" cy="710" rx="70" ry="10" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>

  <!-- Highlight on bowl -->
  <path d="M300 450 Q304 520 340 570" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2" opacity=".7"/>
  <path d="M500 450 Q496 520 460 570" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5" opacity=".5"/>

  <!-- Elderflower garnish — tiny florets -->
  <g fill="#f6f3e3" opacity=".95">
    <g transform="translate(400 440)">
      <circle cx="-32" cy="-3" r="2"/>
      <circle cx="-28" cy="2" r="1.6"/>
      <circle cx="-34" cy="4" r="1.4"/>
      <circle cx="-25" cy="-6" r="1.5"/>
      <circle cx="-18" cy="-2" r="1.8"/>
      <circle cx="-14" cy="3" r="1.4"/>
      <circle cx="20" cy="-4" r="1.6"/>
      <circle cx="26" cy="1" r="1.8"/>
      <circle cx="30" cy="-3" r="1.5"/>
      <circle cx="34" cy="3" r="1.4"/>
    </g>
  </g>
  <!-- Greenery stems -->
  <g stroke="#5a6b3a" stroke-width="1" fill="none" opacity=".8">
    <path d="M368 440 Q370 432 378 436"/>
    <path d="M426 440 Q430 434 434 438"/>
  </g>

  <!-- Bokeh circles background -->
  <g filter="url(#blur2)" opacity=".5">
    <circle cx="120" cy="200" r="42" fill="#dfa964"/>
    <circle cx="680" cy="160" r="36" fill="#b58d52"/>
    <circle cx="720" cy="330" r="24" fill="#c79765"/>
    <circle cx="80"  cy="430" r="28" fill="#9a7042"/>
    <circle cx="150" cy="120" r="18" fill="#e6c58a"/>
  </g>

  <!-- Grain overlay -->
  <rect width="800" height="1000" fill="white" filter="url(#grain2)" opacity=".5"/>

  <!-- Vignette -->
  <radialGradient id="vig2" cx=".5" cy=".5" r=".8">
    <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,.7)"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#vig2)"/>
</svg>
