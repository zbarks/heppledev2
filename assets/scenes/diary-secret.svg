<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Our little secret — a quiet martini moment">
  <defs>
    <radialGradient id="warm" cx=".5" cy=".35" r=".8">
      <stop offset="0%" stop-color="#efdcb6"/>
      <stop offset="60%" stop-color="#b89873"/>
      <stop offset="100%" stop-color="#4c3d2a"/>
    </radialGradient>
    <linearGradient id="table" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f2e8d2"/>
      <stop offset="100%" stop-color="#c2b08c"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" x2="1">
      <stop offset="0%" stop-color="#3a5a4a"/>
      <stop offset="50%" stop-color="#6a9080"/>
      <stop offset="100%" stop-color="#2e4a3c"/>
    </linearGradient>
    <linearGradient id="martiniG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(250,250,245,.95)"/>
      <stop offset="100%" stop-color="rgba(220,220,200,.4)"/>
    </linearGradient>
    <filter id="grain4">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 .9  0 0 0 0 .85  0 0 0 0 .7  0 0 0 .1 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>

  <rect width="800" height="1000" fill="url(#warm)"/>

  <!-- Blurred background (green cabinet / wall) -->
  <rect width="800" height="580" fill="#2d5540" opacity=".75" filter="url(#blur4)"/>
  <rect x="0" y="100" width="800" height="480" fill="#1f3d2e" opacity=".5" filter="url(#blur4)"/>

  <!-- Warm candle glow -->
  <circle cx="480" cy="180" r="130" fill="rgba(255,220,160,.45)" filter="url(#blur4)"/>
  <circle cx="480" cy="170" r="60" fill="rgba(255,240,200,.7)" filter="url(#blur4)"/>

  <!-- Candle -->
  <rect x="468" y="240" width="18" height="80" fill="#f2e6c2"/>
  <ellipse cx="477" cy="240" rx="9" ry="3" fill="#e6d9b0"/>
  <!-- Flame -->
  <path d="M476 218 Q472 210 477 200 Q482 210 478 218 Z" fill="#ffdc88"/>
  <path d="M476 218 Q473 212 477 204 Q481 212 478 218 Z" fill="#fff3c8"/>

  <!-- Table -->
  <path d="M0 620 L800 620 L800 1000 L0 1000 Z" fill="url(#table)"/>

  <!-- Bottle (Hepple-esque) on left -->
  <g transform="translate(100 380)">
    <!-- Neck -->
    <rect x="32" y="0" width="24" height="50" fill="#2a4638"/>
    <!-- Cap -->
    <rect x="28" y="-12" width="32" height="16" rx="2" fill="#6a4a2a"/>
    <!-- Body (rectangular flask shape) -->
    <path d="M10 50 L78 50 L80 260 L8 260 Z" fill="url(#bottle)"/>
    <!-- Label -->
    <rect x="18" y="120" width="52" height="80" fill="#f2e8d4" opacity=".95"/>
    <text x="44" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#003087" letter-spacing="1">HEPPLE</text>
    <text x="44" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#1b1a2e" letter-spacing=".5">GIN</text>
    <line x1="26" y1="173" x2="62" y2="173" stroke="#003087" stroke-width=".4" opacity=".5"/>
    <text x="44" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="3.3" fill="#1b1a2e" letter-spacing=".4">NORTHUMBERLAND</text>
    <!-- Highlight -->
    <path d="M14 60 L18 240" stroke="rgba(200,230,210,.5)" stroke-width="4" fill="none"/>
  </g>

  <!-- Coupe glass 1 (blue-rimmed, centre) -->
  <g transform="translate(380 520)">
    <!-- bowl -->
    <path d="M-55 0 Q-55 60 0 75 Q55 60 55 0 Z" fill="url(#martiniG)" stroke="#1d4a7a" stroke-width="3"/>
    <!-- liquid -->
    <ellipse cx="0" cy="5" rx="48" ry="9" fill="#e6dfc0" opacity=".8"/>
    <!-- olives -->
    <circle cx="-4" cy="5" r="6" fill="#7a8a3a"/>
    <circle cx="6" cy="3" r="5" fill="#8a9a48"/>
    <circle cx="-3" cy="5" r="1.2" fill="#c84040"/>
    <!-- stem -->
    <rect x="-2.5" y="75" width="5" height="55" fill="rgba(230,230,220,.7)"/>
    <!-- foot -->
    <ellipse cx="0" cy="135" rx="30" ry="5" fill="rgba(230,230,220,.8)"/>
  </g>

  <!-- Coupe glass 2 (green, right) -->
  <g transform="translate(560 560)">
    <path d="M-50 0 Q-50 55 0 68 Q50 55 50 0 Z" fill="url(#martiniG)" stroke="#4a7a3a" stroke-width="3"/>
    <ellipse cx="0" cy="5" rx="44" ry="8" fill="#e6dfc0" opacity=".8"/>
    <circle cx="-2" cy="5" r="5.5" fill="#7a8a3a"/>
    <circle cx="6" cy="3" r="4.5" fill="#8a9a48"/>
    <rect x="-2" y="68" width="4" height="45" fill="rgba(230,230,220,.7)"/>
    <ellipse cx="0" cy="115" rx="26" ry="4" fill="rgba(230,230,220,.8)"/>
  </g>

  <!-- Small rose cluster back -->
  <g transform="translate(280 320)" opacity=".9">
    <circle cx="0" cy="0" r="28" fill="#9d2848"/>
    <circle cx="-18" cy="10" r="22" fill="#b03050"/>
    <circle cx="18" cy="8" r="24" fill="#8a1f3e"/>
    <circle cx="0" cy="-18" r="20" fill="#a82a48"/>
    <circle cx="-25" cy="-12" r="18" fill="#8a1f3e"/>
    <!-- leaves -->
    <path d="M-40 20 Q-50 35 -30 38 Q-20 28 -40 20 Z" fill="#3e6040"/>
    <path d="M35 22 Q50 30 38 42 Q22 32 35 22 Z" fill="#3e6040"/>
  </g>

  <!-- Grain -->
  <rect width="800" height="1000" fill="white" filter="url(#grain4)" opacity=".45"/>

  <!-- Vignette -->
  <radialGradient id="vig4" cx=".45" cy=".45" r=".85">
    <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,.55)"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#vig4)"/>
</svg>
