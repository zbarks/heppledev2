<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="The Hepple Estate — Northumbrian moorland at dusk">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#b7c4cc"/>
      <stop offset="40%" stop-color="#9ca9ad"/>
      <stop offset="75%" stop-color="#8a96a0"/>
      <stop offset="100%" stop-color="#5b6b74"/>
    </linearGradient>
    <linearGradient id="hillsFar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#7d8a8a"/>
      <stop offset="100%" stop-color="#5f6c6d"/>
    </linearGradient>
    <linearGradient id="hillsMid" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#59655e"/>
      <stop offset="100%" stop-color="#3e4944"/>
    </linearGradient>
    <linearGradient id="hillsNear" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#3d463e"/>
      <stop offset="100%" stop-color="#22291f"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx=".7" cy=".25" r=".6">
      <stop offset="0%"  stop-color="rgba(244,228,196,.45)"/>
      <stop offset="60%" stop-color="rgba(244,228,196,0)"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.2  0 0 0 0 0.2  0 0 0 0 0.2  0 0 0 .12 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation=".8"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1000" fill="url(#sky)"/>
  <rect width="800" height="1000" fill="url(#sunGlow)"/>

  <!-- Distant hills -->
  <path d="M0 520 Q120 490 240 500 T480 510 T720 490 T800 500 L800 620 L0 620 Z" fill="url(#hillsFar)" opacity=".85" filter="url(#soft)"/>

  <!-- Mid hills -->
  <path d="M0 580 Q150 545 300 560 T560 575 T800 555 L800 720 L0 720 Z" fill="url(#hillsMid)" filter="url(#soft)"/>

  <!-- Near hills / moorland -->
  <path d="M0 650 Q180 610 360 635 T680 650 T800 635 L800 860 L0 860 Z" fill="url(#hillsNear)"/>

  <!-- Foreground moorland -->
  <path d="M0 810 Q120 790 260 800 T540 810 T800 800 L800 1000 L0 1000 Z" fill="#1a1f19"/>

  <!-- Grasses / heather strokes -->
  <g stroke="#2d3428" stroke-width="1.2" fill="none" opacity=".75">
    <path d="M30 860 l3 -22 M45 865 l2 -18 M70 862 l-2 -24 M95 864 l3 -20 M118 860 l-1 -22 M140 862 l2 -18 M170 866 l-2 -20 M195 862 l3 -24 M220 860 l-1 -18 M248 864 l2 -22 M275 862 l-3 -20 M300 865 l2 -24 M328 860 l-1 -18 M355 862 l3 -22 M380 866 l-2 -20 M410 862 l2 -24 M438 860 l-3 -18 M465 864 l3 -22 M495 862 l-2 -20 M522 866 l2 -24 M550 860 l-1 -18 M580 864 l3 -22 M610 862 l-2 -20 M638 866 l2 -24 M668 860 l-1 -18 M695 864 l3 -22 M722 862 l-3 -20 M750 865 l2 -24 M778 860 l-1 -18"/>
  </g>
  <g stroke="#2d3428" stroke-width=".8" fill="none" opacity=".55">
    <path d="M20 920 l2 -28 M55 924 l-1 -22 M88 920 l3 -30 M122 924 l-2 -26 M158 920 l2 -28 M192 924 l-3 -22 M228 920 l2 -30 M262 924 l-1 -26 M298 920 l3 -28 M332 924 l-2 -22 M368 920 l2 -30 M402 924 l-3 -26 M438 920 l2 -28 M472 924 l-1 -22 M508 920 l3 -30 M542 924 l-2 -26 M578 920 l2 -28 M612 924 l-3 -22 M648 920 l2 -30 M682 924 l-1 -26 M718 920 l3 -28 M752 924 l-2 -22 M788 920 l2 -30"/>
  </g>

  <!-- Sparse juniper bushes -->
  <g fill="#0f1612" opacity=".85">
    <ellipse cx="120" cy="855" rx="18" ry="8"/>
    <ellipse cx="280" cy="845" rx="14" ry="6"/>
    <ellipse cx="420" cy="858" rx="22" ry="9"/>
    <ellipse cx="600" cy="852" rx="16" ry="7"/>
    <ellipse cx="740" cy="845" rx="12" ry="6"/>
  </g>

  <!-- Old stone wall detail, right side -->
  <g fill="#6b6558" opacity=".7">
    <path d="M520 810 L800 790 L800 830 L520 850 Z"/>
    <g fill="#4d483f" opacity=".7">
      <rect x="530" y="808" width="12" height="9"/>
      <rect x="548" y="806" width="14" height="10"/>
      <rect x="568" y="804" width="11" height="8"/>
      <rect x="585" y="802" width="13" height="9"/>
      <rect x="604" y="800" width="10" height="8"/>
      <rect x="620" y="798" width="14" height="10"/>
      <rect x="640" y="796" width="12" height="8"/>
      <rect x="658" y="794" width="11" height="9"/>
      <rect x="675" y="792" width="13" height="8"/>
      <rect x="694" y="790" width="12" height="10"/>
      <rect x="712" y="788" width="14" height="8"/>
      <rect x="732" y="786" width="11" height="9"/>
      <rect x="749" y="784" width="13" height="8"/>
      <rect x="768" y="782" width="12" height="10"/>
    </g>
  </g>

  <!-- Grain overlay -->
  <rect width="800" height="1000" fill="white" filter="url(#grain)" opacity=".35"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx=".5" cy=".55" r=".8">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,.35)"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#vignette)"/>
</svg>
